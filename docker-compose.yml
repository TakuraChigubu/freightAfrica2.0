version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freightlink_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freightlink_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/database/migrations/002_add_indexes.sql:/docker-entrypoint-initdb.d/02_indexes.sql
    networks:
      - freightlink_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freightlink_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - freightlink_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  freightlink_network:
    driver: bridge